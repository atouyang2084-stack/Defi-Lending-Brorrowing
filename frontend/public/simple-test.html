<!DOCTYPE html>
<html>
<head>
    <title>简单 Repay 测试</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 20px; }
        .log { background: #f5f5f5; padding: 10px; border-radius: 4px; font-family: monospace; margin: 10px 0; }
        .error { color: red; }
        .success { color: green; }
        button { padding: 10px 20px; margin: 5px; }
    </style>
</head>
<body>
    <h1>简单 Repay 测试</h1>

    <div>
        <button onclick="connectWallet()">1. 连接钱包</button>
        <button onclick="checkNetwork()">2. 检查网络</button>
        <button onclick="sendTestTransaction()">3. 发送测试交易</button>
    </div>

    <div id="log" class="log"></div>

    <script>
        let userAddress = null;
        const logDiv = document.getElementById('log');

        function log(message, type = 'info') {
            const p = document.createElement('p');
            p.className = type;
            p.textContent = `[${new Date().toLocaleTimeString()}] ${message}`;
            logDiv.appendChild(p);
            logDiv.scrollTop = logDiv.scrollHeight;
        }

        async function connectWallet() {
            try {
                if (!window.ethereum) {
                    log('错误: 请安装 MetaMask', 'error');
                    return;
                }

                const accounts = await window.ethereum.request({
                    method: 'eth_requestAccounts'
                });

                userAddress = accounts[0];
                log(`✅ 钱包已连接: ${userAddress}`, 'success');

            } catch (error) {
                log(`连接失败: ${error.message}`, 'error');
            }
        }

        async function checkNetwork() {
            try {
                if (!window.ethereum) {
                    log('错误: 请先连接钱包', 'error');
                    return;
                }

                const chainId = await window.ethereum.request({
                    method: 'eth_chainId'
                });

                log(`当前网络 chainId: ${chainId}`, 'info');

                if (chainId === '0x7a69') {
                    log('✅ 网络正确: localhost (31337)', 'success');
                } else {
                    log(`⚠️ 网络不正确，期望: 0x7a69 (31337)`, 'error');
                }

            } catch (error) {
                log(`检查网络失败: ${error.message}`, 'error');
            }
        }

        async function sendTestTransaction() {
            try {
                if (!userAddress) {
                    log('错误: 请先连接钱包', 'error');
                    return;
                }

                log('发送测试交易...', 'info');

                // 这是一个非常简单的交易 - 发送 0 ETH 给自己
                const transactionParameters = {
                    to: userAddress, // 发送给自己
                    from: userAddress,
                    value: '0x0', // 0 ETH
                    data: '0x', // 无数据
                };

                log('交易参数:', 'info');
                log(JSON.stringify(transactionParameters, null, 2), 'info');

                const txHash = await window.ethereum.request({
                    method: 'eth_sendTransaction',
                    params: [transactionParameters],
                });

                log(`✅ 交易已发送! 哈希: ${txHash}`, 'success');
                log('请检查 MetaMask 是否弹出确认窗口', 'info');

            } catch (error) {
                log(`交易失败: ${error.message}`, 'error');
                log(`错误详情: ${JSON.stringify(error)}`, 'error');
            }
        }

        // 页面加载时检查是否已连接钱包
        window.addEventListener('load', async () => {
            if (window.ethereum) {
                try {
                    const accounts = await window.ethereum.request({
                        method: 'eth_accounts'
                    });

                    if (accounts.length > 0) {
                        userAddress = accounts[0];
                        log(`已检测到已连接的钱包: ${userAddress}`, 'success');
                    }
                } catch (error) {
                    log(`检查已连接账户失败: ${error.message}`, 'error');
                }
            }
        });

        log('页面已加载，点击"连接钱包"开始测试', 'info');
    </script>
</body>
</html>
