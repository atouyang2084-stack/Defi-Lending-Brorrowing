<!DOCTYPE html>
<html>
<head>
    <title>测试 Repay 功能</title>
    <script src="https://cdn.jsdelivr.net/npm/ethers@5.7.0/dist/ethers.umd.min.js"></script>
    <style>
        body { font-family: Arial, sans-serif; margin: 20px; }
        .container { max-width: 800px; margin: 0 auto; }
        .section { margin-bottom: 30px; padding: 20px; border: 1px solid #ccc; border-radius: 5px; }
        .button { padding: 10px 20px; background: #007bff; color: white; border: none; border-radius: 4px; cursor: pointer; }
        .button:disabled { background: #ccc; }
        .log { background: #f5f5f5; padding: 10px; border-radius: 4px; font-family: monospace; white-space: pre-wrap; max-height: 300px; overflow-y: auto; }
        .error { color: red; }
        .success { color: green; }
    </style>
</head>
<body>
    <div class="container">
        <h1>测试 Repay 功能</h1>

        <div class="section">
            <h2>1. 连接钱包</h2>
            <p>确保 MetaMask 已连接到 localhost:8545 (chainId: 31337)</p>
            <button id="connectBtn" class="button">连接钱包</button>
            <p id="walletInfo"></p>
        </div>

        <div class="section">
            <h2>2. 检查状态</h2>
            <button id="checkStatusBtn" class="button">检查状态</button>
            <div id="statusInfo" class="log"></div>
        </div>

        <div class="section">
            <h2>3. 测试 Repay</h2>
            <p>金额 (USDC): <input type="number" id="repayAmount" value="1" step="0.1" min="0.1"></p>
            <button id="testRepayBtn" class="button">测试 Repay</button>
            <div id="repayResult" class="log"></div>
        </div>

        <div class="section">
            <h2>4. 日志</h2>
            <div id="logOutput" class="log"></div>
        </div>
    </div>

    <script>
        let userAddress = null;
        const logOutput = document.getElementById('logOutput');
        const statusInfo = document.getElementById('statusInfo');
        const repayResult = document.getElementById('repayResult');
        const walletInfo = document.getElementById('walletInfo');

        // 合约地址
        const CONTRACT_ADDRESSES = {
            LENDING_POOL: "0x5FC8d32690cc91D4c39d9d3abcBD16989F875707",
            USDC: "0xe7f1725E7734CE288F8367e1Bb143E90bb3F0512",
            WBTC: "0x9fE46736679d2D9a65F0992F2272dE9f3c7fa6e0"
        };

        // 简单的 ABI 片段
        const LENDING_POOL_ABI = [
            "function userAccountData(address user) view returns (uint256 collateralValueUsdWad, uint256 debtValueUsdWad, uint256 weightedCollateralForHFUsdWad, uint256 currentHealthFactorRay)",
            "function userBorrowBalance(address user, address asset) view returns (uint256)",
            "function repay(tuple(address asset, uint256 amount, address onBehalfOf) p) returns (uint256 repaidAmount)"
        ];

        const ERC20_ABI = [
            "function balanceOf(address owner) view returns (uint256)",
            "function allowance(address owner, address spender) view returns (uint256)",
            "function approve(address spender, uint256 amount) returns (bool)"
        ];

        function log(message, type = 'info') {
            const timestamp = new Date().toISOString().split('T')[1].split('.')[0];
            const div = document.createElement('div');
            div.className = type;
            div.textContent = `[${timestamp}] ${message}`;
            logOutput.appendChild(div);
            logOutput.scrollTop = logOutput.scrollHeight;
        }

        async function connectWallet() {
            try {
                if (!window.ethereum) {
                    throw new Error('请安装 MetaMask');
                }

                const accounts = await window.ethereum.request({ method: 'eth_requestAccounts' });
                userAddress = accounts[0];
                walletInfo.textContent = `已连接: ${userAddress}`;
                log(`钱包已连接: ${userAddress}`);

                // 检查网络
                const chainId = await window.ethereum.request({ method: 'eth_chainId' });
                if (chainId !== '0x7a69') {
                    log(`警告: 当前网络 chainId: ${chainId}，期望: 0x7a69 (31337)`, 'error');
                } else {
                    log('网络正确: localhost (chainId: 31337)');
                }
            } catch (error) {
                log(`连接钱包失败: ${error.message}`, 'error');
            }
        }

        async function checkStatus() {
            if (!userAddress) {
                log('请先连接钱包', 'error');
                return;
            }

            try {
                const provider = new ethers.BrowserProvider(window.ethereum);
                const signer = await provider.getSigner();

                // 加载合约
                const pool = new ethers.Contract(CONTRACT_ADDRESSES.LENDING_POOL, LENDING_POOL_ABI, signer);
                const usdc = new ethers.Contract(CONTRACT_ADDRESSES.USDC, ERC20_ABI, signer);

                // 检查账户数据
                const accountData = await pool.userAccountData(userAddress);
                const collateralValue = ethers.formatUnits(accountData[0], 18);
                const debtValue = ethers.formatUnits(accountData[1], 18);
                const healthFactor = ethers.formatUnits(accountData[3], 27);

                // 检查借款余额
                const borrowBalance = await pool.userBorrowBalance(userAddress, CONTRACT_ADDRESSES.USDC);
                const borrowBalanceFormatted = ethers.formatUnits(borrowBalance, 6);

                // 检查USDC余额
                const usdcBalance = await usdc.balanceOf(userAddress);
                const usdcBalanceFormatted = ethers.formatUnits(usdcBalance, 6);

                // 检查授权
                const allowance = await usdc.allowance(userAddress, CONTRACT_ADDRESSES.LENDING_POOL);
                const allowanceFormatted = ethers.formatUnits(allowance, 6);

                statusInfo.innerHTML = `
                    <strong>账户数据:</strong><br>
                    - 抵押品价值: $${collateralValue}<br>
                    - 债务价值: $${debtValue}<br>
                    - 健康因子: ${healthFactor}<br>
                    <br>
                    <strong>USDC 状态:</strong><br>
                    - 借款余额: ${borrowBalanceFormatted} USDC<br>
                    - 钱包余额: ${usdcBalanceFormatted} USDC<br>
                    - 授权给合约: ${allowanceFormatted} USDC<br>
                    <br>
                    <strong>合约地址:</strong><br>
                    - LendingPool: ${CONTRACT_ADDRESSES.LENDING_POOL}<br>
                    - USDC: ${CONTRACT_ADDRESSES.USDC}
                `;

                log('状态检查完成');
            } catch (error) {
                log(`状态检查失败: ${error.message}`, 'error');
            }
        }

        async function testRepay() {
            if (!userAddress) {
                log('请先连接钱包', 'error');
                return;
            }

            const amount = document.getElementById('repayAmount').value;
            if (!amount || parseFloat(amount) <= 0) {
                log('请输入有效的金额', 'error');
                return;
            }

            try {
                const provider = new ethers.BrowserProvider(window.ethereum);
                const signer = await provider.getSigner();

                // 加载合约
                const pool = new ethers.Contract(CONTRACT_ADDRESSES.LENDING_POOL, LENDING_POOL_ABI, signer);
                const usdc = new ethers.Contract(CONTRACT_ADDRESSES.USDC, ERC20_ABI, signer);

                // 转换金额
                const amountBigInt = ethers.parseUnits(amount, 6);
                log(`还款金额: ${amount} USDC (${amountBigInt.toString()})`);

                // 检查借款余额
                const borrowBalance = await pool.userBorrowBalance(userAddress, CONTRACT_ADDRESSES.USDC);
                if (borrowBalance === 0n) {
                    log('错误: 没有借款余额，无需还款', 'error');
                    return;
                }

                if (amountBigInt > borrowBalance) {
                    log(`错误: 还款金额超过借款余额 (最大: ${ethers.formatUnits(borrowBalance, 6)} USDC)`, 'error');
                    return;
                }

                // 检查余额
                const usdcBalance = await usdc.balanceOf(userAddress);
                if (usdcBalance < amountBigInt) {
                    log(`错误: 余额不足 (需要: ${ethers.formatUnits(amountBigInt, 6)} USDC, 拥有: ${ethers.formatUnits(usdcBalance, 6)} USDC)`, 'error');
                    return;
                }

                // 检查授权
                const allowance = await usdc.allowance(userAddress, CONTRACT_ADDRESSES.LENDING_POOL);
                if (allowance < amountBigInt) {
                    log(`授权不足，正在授权... (需要: ${ethers.formatUnits(amountBigInt, 6)} USDC, 已授权: ${ethers.formatUnits(allowance, 6)} USDC)`);

                    const approveTx = await usdc.approve(CONTRACT_ADDRESSES.LENDING_POOL, amountBigInt);
                    log(`授权交易已发送: ${approveTx.hash}`);

                    const approveReceipt = await approveTx.wait();
                    log(`授权成功！区块: ${approveReceipt.blockNumber}`);
                }

                // 执行还款
                log('执行还款...');
                const repayParams = {
                    asset: CONTRACT_ADDRESSES.USDC,
                    amount: amountBigInt,
                    onBehalfOf: userAddress
                };

                log(`还款参数: ${JSON.stringify({
                    ...repayParams,
                    amount: amountBigInt.toString(),
                    amountHex: '0x' + amountBigInt.toString(16)
                })}`);

                const repayTx = await pool.repay(repayParams);
                log(`还款交易已发送: ${repayTx.hash}`);

                repayResult.innerHTML = `
                    <strong>交易已发送!</strong><br>
                    哈希: ${repayTx.hash}<br>
                    等待确认...
                `;

                // 等待交易确认
                log('等待交易确认...');
                const receipt = await repayTx.wait();
                log(`还款成功！区块: ${receipt.blockNumber}, 交易哈希: ${receipt.hash}`);

                repayResult.innerHTML = `
                    <strong class="success">还款成功!</strong><br>
                    交易哈希: ${receipt.hash}<br>
                    区块: ${receipt.blockNumber}<br>
                    <br>
                    <strong>请刷新状态查看更新...</strong>
                `;

                // 等待一下然后刷新状态
                setTimeout(() => {
                    checkStatus();
                }, 3000);

            } catch (error) {
                log(`还款失败: ${error.message}`, 'error');
                repayResult.innerHTML = `<strong class="error">还款失败:</strong><br>${error.message}`;
            }
        }

        // 绑定按钮事件
        document.getElementById('connectBtn').addEventListener('click', connectWallet);
        document.getElementById('checkStatusBtn').addEventListener('click', checkStatus);
        document.getElementById('testRepayBtn').addEventListener('click', testRepay);

        // 检查是否已安装 ethers
        if (typeof ethers === 'undefined') {
            log('错误: ethers.js 未加载。请确保已安装 ethers.js', 'error');
        } else {
            log('ethers.js 已加载');
        }
    </script>
</body>
</html>
